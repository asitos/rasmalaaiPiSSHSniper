name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Verify Environment
      run: g++ --version

    - name: Compile Engine
      run: make all

    - name: Verify Binary Creation
      run: test -f ./ssh-sniper/ssh-sniper || exit 1
